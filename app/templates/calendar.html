<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .calendar-container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px #0002;
            padding: 30px;
            text-align: center;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header button {
            font-size: 28px;
            padding: 5px 20px;
            border-radius: 8px;
            border: none;
            background: #b31054;
            color: #fff;
            cursor: pointer;
        }
        .calendar-header span {
            font-size: 32px;
            font-weight: bold;
        }
        table.calendar {
            width: 100%;
            border-collapse: collapse;
        }
        table.calendar th, table.calendar td {
            width: 14.2%;
            height: 60px;
            font-size: 22px;
            border: 1px solid #eee;
            text-align: center;
        }
        table.calendar th {
            background: #b31054;
            color: #fff;
        }
        table.calendar td.today {
            background: #222;
            color: #fff;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>

    <div class="sidebar" id="sidebar">
        <a href="{{ url_for('main.home') }}">Home</a>
        <a href="{{ url_for('main.mindmodule') }}">Mind Module</a>
        <a href="{{ url_for('main.studycore') }}">Study Core</a>
        <a href="{{ url_for('main.missionlog') }}">Mission Log</a>
        <a href="{{ url_for('main.clock') }}">Clock</a>
        <a href="{{ url_for('main.calendar') }}">Calendar</a>
</div>
    </div>
        <script>
        function toggleSidebar() {
            let sidebar = document.getElementById("sidebar");
            if (sidebar.style.left === "-250px") {
                sidebar.style.left = "0";
            } else {
                sidebar.style.left = "-250px";
            }
        }
    </script>
    <div class="calendar-container">
        <div class="calendar-header">
            <button onclick="prevMonth()">&lt;</button>
            <span id="monthYear"></span>
            <button onclick="nextMonth()">&gt;</button>
        </div>
        <table class="calendar">
            <thead>
                <tr>
                    <th>Sun</th>
                    <th>Mon</th>
                    <th>Tue</th>
                    <th>Wed</th>
                    <th>Thu</th>
                    <th>Fri</th>
                    <th>Sat</th>
                </tr>
            </thead>
            <tbody id="calendar-body">
                <!-- Calendar days will be injected here -->
            </tbody>
        </table>
    </div>
    <script>
        let today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();

        function renderCalendar(month, year) {
            const monthYear = document.getElementById('monthYear');
            const calendarBody = document.getElementById('calendar-body');
            const months = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            monthYear.textContent = `${months[month]} ${year}`;

            // First day of the month
            let firstDay = new Date(year, month, 1).getDay();
            // Number of days in the month
            let daysInMonth = new Date(year, month + 1, 0).getDate();

            calendarBody.innerHTML = "";
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    if (i === 0 && j < firstDay) {
                        let cell = document.createElement('td');
                        cell.textContent = "";
                        row.appendChild(cell);
                    } else if (date > daysInMonth) {
                        break;
                    } else {
                        let cell = document.createElement('td');
                        cell.textContent = date;
                        // Highlight today
                        if (
                            date === today.getDate() &&
                            month === today.getMonth() &&
                            year === today.getFullYear()
                        ) {
                            cell.classList.add('today');
                        }
                        row.appendChild(cell);
                        date++;
                    }
                }
                calendarBody.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar(currentMonth, currentYear);
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentMonth, currentYear);
        }

        renderCalendar(currentMonth, currentYear);
    </script>
</body>
</html>
