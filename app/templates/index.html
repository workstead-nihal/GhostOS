<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>GhostOS Dashboard</title>
    <style>
        .dashboard {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }
        .card {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            color: #fff;
            min-width: 300px;
            text-align: center;
            box-shadow: 0 2px 8px #0006;
        }
        .card h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .card p {
            font-size: 28px;
        }
    </style>
</head>
<body>
    <header>
        <h1>GhostOS Dashboard</h1>
        <nav>
           <label for="module-select">Go to module:</label>
            <select id="module-select" onchange="location = this.value;">
                <option value="/">Mind Module</option>
                <option value="/about">Task Module</option>
                <option value="/about">Study Module</option>
                <option value="/about">Clock</option>
                <option value="/about">Calander</option>
                <option value="/about">Settings</option>
                <!-- Add more modules/routes as needed -->
            </select>
        </nav>
    </header>
    <main>
        <div class="dashboard">
            <div class="card">
                <h2>Module 1</h2>
                <p>Quick info or stats</p>
                <a href="/module1">Open</a>
            </div>
            <div class="card">
                <h2>Module 2</h2>
                <p>Quick info or stats</p>
                <a href="/module2">Open</a>
            </div>
            <!-- Add more cards as needed -->
        </div>
    </main>
        <footer>
        <p>&copy; 2025 N3ON</p>
    </footer>
</body>
</html>
